<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Characters & Guns – Bari Games</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Orbitron&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .theme-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1.2rem; cursor: pointer; padding: 0.4rem 0.8rem; border-radius: 40px; color: inherit; display: inline-flex; align-items: center; gap: 6px; transition: 0.3s; }
        .theme-btn:hover { background: #f9b23f; color: #0b0d17; }
        body.light-theme .theme-btn { background: rgba(0,0,0,0.05); }
        .profile-icon { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid #f9b23f; }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="navbar">
                <div class="logo"><a href="index.html">BARI GAMES</a></div>
                <div class="nav-links" id="navLinks"></div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="section-header"><h2>Legendary Warriors</h2></div>
            <div class="cards-grid" id="charactersGrid"></div>
            <div class="section-header"><h2>Deadly Arsenal</h2></div>
            <div class="cards-grid" id="gunsGrid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid"><div class="footer-col"><h4>Bari Games</h4><ul><li><a href="#">About</a></li><li><a href="#">Press</a></li></ul></div><div class="footer-col"><h4>Support</h4><ul><li><a href="#">FAQ</a></li><li><a href="#">Contact</a></li></ul></div><div class="footer-col"><h4>Legal</h4><ul><li><a href="#">Privacy</a></li><li><a href="#">Terms</a></li></ul></div><div class="footer-col"><h4>Follow</h4><div class="social-links"><a href="#"><i class="fab fa-discord"></i></a><a href="#"><i class="fab fa-twitter"></i></a></div></div></div>
            <div class="copyright">© 2025 Bari Games – Rapid Fire. All rights reserved.</div>
        </div>
    </footer>

    <script>
        // Theme and Navbar logic
        const THEME_KEY = 'bari_theme';
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-theme');
                localStorage.setItem(THEME_KEY, 'light');
            } else {
                document.body.classList.remove('light-theme');
                localStorage.setItem(THEME_KEY, 'dark');
            }
            const btn = document.getElementById('globalThemeToggle');
            if (btn) {
                const icon = btn.querySelector('i');
                const span = btn.querySelector('span');
                if (theme === 'light') {
                    if (icon) icon.className = 'fas fa-sun';
                    if (span) span.innerText = 'Light';
                } else {
                    if (icon) icon.className = 'fas fa-moon';
                    if (span) span.innerText = 'Dark';
                }
            }
        }
        const saved = localStorage.getItem(THEME_KEY);
        setTheme(saved === 'light' ? 'light' : 'dark');

        function getCurrentUser() {
            let curr = JSON.parse(localStorage.getItem('bari_current_user'));
            if (!curr) return null;
            let users = JSON.parse(localStorage.getItem('bari_users')) || [];
            return users.find(u => u.id === curr.id);
        }

        function updateNavbar() {
            const navLinks = document.getElementById('navLinks');
            if (!navLinks) return;
            const user = getCurrentUser();
            if (user) {
                navLinks.innerHTML = `
                    <a href="index.html">Home</a>
                    <a href="About.html">About Us</a>
                    <a href="Characters Abd Guns.html" class="active">Characters & Guns</a>
                    <img src="${user.profileImage || 'Images/celestial.png'}" class="profile-icon" id="profileIcon" alt="Profile">
                    <button id="logoutBtn" style="background:#e11d48; padding:0.4rem 1rem; border:none; border-radius:40px; color:white; cursor:pointer;">Logout</button>
                    <button id="globalThemeToggle" class="theme-btn"><i class="fas fa-moon"></i> <span>Dark</span></button>
                `;
                document.getElementById('profileIcon')?.addEventListener('click', () => window.location.href = 'profile.html');
                document.getElementById('logoutBtn')?.addEventListener('click', () => {
                    localStorage.removeItem('bari_current_user');
                    location.reload();
                });
                const newToggle = document.getElementById('globalThemeToggle');
                if (newToggle) {
                    const isLight = document.body.classList.contains('light-theme');
                    const icon = newToggle.querySelector('i');
                    const span = newToggle.querySelector('span');
                    if (isLight) {
                        if (icon) icon.className = 'fas fa-sun';
                        if (span) span.innerText = 'Light';
                    } else {
                        if (icon) icon.className = 'fas fa-moon';
                        if (span) span.innerText = 'Dark';
                    }
                    newToggle.addEventListener('click', () => {
                        const isLightNow = document.body.classList.contains('light-theme');
                        setTheme(isLightNow ? 'dark' : 'light');
                        updateNavbar();
                    });
                }
            } else {
                navLinks.innerHTML = `
                    <a href="index.html">Home</a>
                    <a href="About.html">About Us</a>
                    <a href="Characters Abd Guns.html" class="active">Characters & Guns</a>
                    <a href="login.html">Login</a>
                    <a href="signup.html" class="btn-outline">Sign Up</a>
                    <button id="globalThemeToggle" class="theme-btn"><i class="fas fa-moon"></i> <span>Dark</span></button>
                `;
                const toggleBtn = document.getElementById('globalThemeToggle');
                if (toggleBtn) {
                    const isLight = document.body.classList.contains('light-theme');
                    const icon = toggleBtn.querySelector('i');
                    const span = toggleBtn.querySelector('span');
                    if (isLight) {
                        if (icon) icon.className = 'fas fa-sun';
                        if (span) span.innerText = 'Light';
                    } else {
                        if (icon) icon.className = 'fas fa-moon';
                        if (span) span.innerText = 'Dark';
                    }
                    toggleBtn.addEventListener('click', () => {
                        const isLightNow = document.body.classList.contains('light-theme');
                        setTheme(isLightNow ? 'dark' : 'light');
                        updateNavbar();
                    });
                }
            }
        }
        updateNavbar();

        // Characters and Guns data (same as before)
        const characters = [
            { name: "The Celestial", img: "Images/celestial.png", desc: "God of Destruction, uses The Tragger — dagger at 100km/h." },
            { name: "The Scare Crow", img: "Images/scarecorw.webp", desc: "Mutated scarecrow, Scare Gun summons crows." },
            { name: "The Pumpkin", img: "Images/pumpkin.webp", desc: "Horrorlands ghost, Horrarinator gives nightmares." },
            { name: "The Salina", img: "Images/selina.webp", desc: "Captain of all girls, Blade of Thousand Lasers." },
            { name: "The Froster", img: "Images/froster.webp", desc: "God of Ice, Katana of Nitro-Ice." },
            { name: "The Knight", img: "Images/knight.png", desc: "Most powerful knight, Spear of Thousand Knights." },
            { name: "Mr. Bunny", img: "Images/bunny.png", desc: "Mutant bunny, Carrot Shooter & Reaper." },
            { name: "The Death Rider", img: "Images/rider.png", desc: "No mercy That Is His Motto." },
            { name: "The Hunter", img: "Images/hunter.png", desc: "Be Careful As He Attacks From The Dark." },
            { name: "The Assasian", img: "Images/assasian.png", desc: "Once You Get On His Kill Book No One Can Save You." },
            { name: "The Spider Man", img: "Images/spider.png", desc: "The Legendary Spider Man To Save The Day With Collaboration Of Bari Games And Sony." },
            { name: "The Ultimate Batman", img: "Images/bat.png", desc: "The City needs A Hero The City Needs 'BATMAN' With Collaboration Of Bari Games And Batman." }
        ];
        const guns = [
            { name: "MTX", img: "images/mtx.jpg", desc: "Shoots twice at a time, 120 bullets burst." },
            { name: "The Drum Gun", img: "images/drum.jpg", desc: "230 bullets without reload." },
            { name: "The Disaster", img: "images/disaster.jpg", desc: "Laser beam burns everything for 30 seconds." },
            { name: "The Grenade Launcher", img: "images/gernade.jpg", desc: "Massive area damage." },
            { name: "The Energy Rifle", img: "images/energy.jpg", desc: "Solar powered high damage rifle." },
            { name: "Grappel Gun And Batarang", img: "Images/bat_weapon.png", desc: "Special Batman Grappel Gun And Batarang." }
        ];
        function render(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = items.map(item => `<div class="game-card"><div class="card-img"><img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300?text=Missing'"></div><div class="card-content"><h3>${item.name}</h3><p>${item.desc}</p></div></div>`).join('');
        }
        render('charactersGrid', characters);
        render('gunsGrid', guns);
    </script>
</body>
</html>
