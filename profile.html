<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Bari Games</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Orbitron&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        .profile-container { max-width: 1000px; margin: 2rem auto; background: #131725; border-radius: 32px; padding: 2rem; border: 1px solid #2a2f42; transition: all 0.3s; }
        .stats-grid { display: flex; gap: 2rem; justify-content: center; margin: 2rem 0; flex-wrap: wrap; }
        .stat-card { background: #1a1f2e; padding: 1rem 2rem; border-radius: 28px; text-align: center; min-width: 140px; }
        .stat-card span { font-size: 2rem; font-weight: bold; color: #f9b23f; display: block; }
        .chart-box { max-width: 500px; margin: 2rem auto; background: #1a1f2e; padding: 1rem; border-radius: 24px; }
        .star-rating { display: flex; gap: 0.5rem; font-size: 2rem; cursor: pointer; margin: 1rem 0; justify-content: center; }
        .star { color: #555; transition: 0.2s; }
        .star.active { color: #f9b23f; }
        textarea { width: 100%; background: #1a1f2e; border: 1px solid #f9b23f; border-radius: 20px; padding: 0.8rem; color: white; font-family: inherit; }
        button { background: #f9b23f; border: none; padding: 0.6rem 1.5rem; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 0.5rem; }
        .simulate-buttons { display: flex; gap: 1rem; justify-content: center; margin: 1rem 0; }
        .profile-img-large { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #f9b23f; margin-bottom: 1rem; }
        .img-option { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid transparent; margin: 0.3rem; }
        .img-option.selected { border-color: #f9b23f; transform: scale(1.05); }
        .existing-review { background: #0b0d17; padding: 1rem; border-radius: 20px; margin-top: 1rem; border: 1px solid #f9b23f;  }
        .theme-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1.2rem; cursor: pointer; padding: 0.4rem 0.8rem; border-radius: 40px; display: inline-flex; align-items: center; gap: 6px; }
        .back-home { color: #f9b23f; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
        .profile-image-section { text-align: center; }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; }

        /* Light theme */
        body.light-theme .profile-container, body.light-theme .stat-card, body.light-theme .chart-box { background: #fff; border-color: #dce1f0; color: #1e1f2c; }
        body.light-theme textarea { background: #fff; color: #1e1f2c; border-color: #f9b23f; }
        body.light-theme .existing-review { background: #f5f7fe; color: #1e1f2c; }
        body.light-theme .theme-btn { background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="navbar">
                <div class="logo"><a href="index.html">BARI GAMES</a></div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="About.html">About Us</a>
                    <a href="Characters Abd Guns.html">Characters & Guns</a>
                    <button id="globalThemeToggle" class="theme-btn"><i class="fas fa-moon"></i> <span>Dark</span></button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <a href="index.html" class="back-home">← Back to Home</a>
            <div class="profile-container">
                <div class="profile-image-section">
                    <img id="profileImageLarge" class="profile-img-large" src="Images/celestial.png">
                    <h2 id="welcomeMsg"></h2>
                    <p><strong>Account Type:</strong> <span id="accountType"></span></p>
                    <button id="editImageBtn">Change Profile Image</button>
                </div>

                <div id="imageSelector" style="display:none; text-align:center; margin:1rem 0;">
                    <div id="imageGrid" style="display:flex; flex-wrap:wrap; justify-content:center; gap:0.5rem;"></div>
                    <button id="saveImageBtn">Save</button>
                    <button id="cancelImageBtn">Cancel</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><span id="matches">0</span>Matches</div>
                    <div class="stat-card"><span id="wins">0</span>Wins</div>
                    <div class="stat-card"><span id="losses">0</span>Losses</div>
                </div>

                <div class="simulate-buttons">
                    <button id="addMatchBtn">➕ Play Match</button>
                    <button id="resetStatsBtn">🔄 Reset Stats</button>
                </div>

                <div class="chart-box">
                    <canvas id="statsChart"></canvas>
                </div>

                <div class="feedback-section">
                    <h3>Your Feedback</h3>
                    <div class="star-rating" id="starRating">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                    <textarea id="reviewText" rows="3" placeholder="Write your review..."></textarea>
                    <button id="saveReviewBtn">Save Review</button>
                    <div id="existingReviewDiv" class="existing-review"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container"><div class="copyright">© 2025 Bari Games – Rapid Fire. All rights reserved.</div></div>
    </footer>

    <script>
        // ---------- THEME ----------
        const THEME_KEY = 'bari_theme';
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-theme');
                localStorage.setItem(THEME_KEY, 'light');
            } else {
                document.body.classList.remove('light-theme');
                localStorage.setItem(THEME_KEY, 'dark');
            }
            const btn = document.getElementById('globalThemeToggle');
            if (btn) {
                const icon = btn.querySelector('i');
                const span = btn.querySelector('span');
                if (theme === 'light') {
                    icon.className = 'fas fa-sun';
                    span.innerText = 'Light';
                } else {
                    icon.className = 'fas fa-moon';
                    span.innerText = 'Dark';
                }
            }
        }
        const savedTheme = localStorage.getItem(THEME_KEY);
        setTheme(savedTheme === 'light' ? 'light' : 'dark');
        document.getElementById('globalThemeToggle')?.addEventListener('click', () => {
            setTheme(document.body.classList.contains('light-theme') ? 'dark' : 'light');
        });

        // ---------- PROFILE DATA ----------
        let statsChart = null;
        let selectedRating = 0;
        let tempSelectedImage = null;
        const availableImages = [
            "Images/celestial.png", "Images/scarecorw.webp", "Images/pumpkin.webp",
            "Images/selina.webp", "Images/froster.webp", "Images/knight.png",
            "Images/bunny.png", "Images/rider.png", "Images/hunter.png",
            "Images/assasian.png", "Images/spider.png", "Images/bat.png"
        ];

        function getUsers() { return JSON.parse(localStorage.getItem('bari_users')) || []; }
        function saveUsers(users) { localStorage.setItem('bari_users', JSON.stringify(users)); }
        function getCurrentUser() {
            let curr = JSON.parse(localStorage.getItem('bari_current_user'));
            if (!curr) return null;
            return getUsers().find(u => u.id === curr.id);
        }
        function updateUserInStorage(updatedUser) {
            let users = getUsers();
            let idx = users.findIndex(u => u.id === updatedUser.id);
            if (idx !== -1) users[idx] = updatedUser;
            saveUsers(users);
        }

        function renderProfile() {
            let user = getCurrentUser();
            if (!user) { window.location.href = "login.html"; return; }
            document.getElementById('welcomeMsg').innerHTML = `Welcome, ${user.username}`;
            document.getElementById('accountType').innerText = user.accountType.toUpperCase();
            document.getElementById('matches').innerText = user.stats.matches;
            document.getElementById('wins').innerText = user.stats.wins;
            document.getElementById('losses').innerText = user.stats.losses;
            document.getElementById('profileImageLarge').src = user.profileImage || 'Images/celestial.png';

            if (statsChart) statsChart.destroy();
            const ctx = document.getElementById('statsChart').getContext('2d');
            statsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Wins', 'Losses'],
                    datasets: [{ label: 'Count', data: [user.stats.wins, user.stats.losses], backgroundColor: ['#f9b23f', '#e11d48'], borderRadius: 10 }]
                },
                options: { responsive: true }
            });

            if (user.review && user.review.text) {
                document.getElementById('existingReviewDiv').innerHTML = `
                    <strong>Your review:</strong><br>
                    Rating: ${'★'.repeat(user.review.rating)}${'☆'.repeat(5-user.review.rating)}<br>
                    "${user.review.text}"<br>
                    <small>${user.review.date}</small>
                `;
                document.getElementById('reviewText').value = user.review.text;
                highlightStars(user.review.rating);
                selectedRating = user.review.rating;
            } else {
                document.getElementById('existingReviewDiv').innerHTML = "<em>No review yet.</em>";
                highlightStars(0);
                selectedRating = 0;
            }
        }

        function highlightStars(rating) {
            let stars = document.querySelectorAll('.star');
            stars.forEach((star, i) => i < rating ? star.classList.add('active') : star.classList.remove('active'));
        }
        function bindStarEvents() {
            document.querySelectorAll('.star').forEach(star => {
                star.addEventListener('click', function() {
                    selectedRating = parseInt(this.dataset.value);
                    highlightStars(selectedRating);
                });
            });
        }
        function saveReview() {
            let user = getCurrentUser();
            if (!user) return;
            let text = document.getElementById('reviewText').value.trim();
            if (selectedRating === 0) { alert("Please select a rating."); return; }
            if (!text) { alert("Please write a review."); return; }
            user.review = { text, rating: selectedRating, date: new Date().toLocaleString() };
            updateUserInStorage(user);
            renderProfile();
            alert("Review saved!");
        }
        function addMatch() {
            let user = getCurrentUser();
            if (!user) return;
            let win = Math.random() < 0.5;
            user.stats.matches++;
            if (win) user.stats.wins++; else user.stats.losses++;
            updateUserInStorage(user);
            renderProfile();
        }
        function resetStats() {
            if (confirm("Reset all match stats?")) {
                let user = getCurrentUser();
                if (user) { user.stats = { matches: 0, wins: 0, losses: 0 }; updateUserInStorage(user); renderProfile(); }
            }
        }
        function showImageSelector() {
            let grid = document.getElementById('imageGrid');
            grid.innerHTML = '';
            availableImages.forEach(img => {
                let imgEl = document.createElement('img');
                imgEl.src = img;
                imgEl.classList.add('img-option');
                imgEl.addEventListener('click', () => {
                    document.querySelectorAll('.img-option').forEach(opt => opt.classList.remove('selected'));
                    imgEl.classList.add('selected');
                    tempSelectedImage = img;
                });
                grid.appendChild(imgEl);
            });
            document.getElementById('imageSelector').style.display = 'block';
        }
        function saveProfileImage() {
            if (tempSelectedImage) {
                let user = getCurrentUser();
                if (user) { user.profileImage = tempSelectedImage; updateUserInStorage(user); renderProfile(); }
            }
            document.getElementById('imageSelector').style.display = 'none';
        }
        function cancelImageSelect() {
            document.getElementById('imageSelector').style.display = 'none';
            tempSelectedImage = null;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!getCurrentUser()) { window.location.href = "login.html"; return; }
            renderProfile();
            bindStarEvents();
            document.getElementById('saveReviewBtn').addEventListener('click', saveReview);
            document.getElementById('addMatchBtn').addEventListener('click', addMatch);
            document.getElementById('resetStatsBtn').addEventListener('click', resetStats);
            document.getElementById('editImageBtn').addEventListener('click', showImageSelector);
            document.getElementById('saveImageBtn').addEventListener('click', saveProfileImage);
            document.getElementById('cancelImageBtn').addEventListener('click', cancelImageSelect);
        });
    </script>
</body>
</html>
